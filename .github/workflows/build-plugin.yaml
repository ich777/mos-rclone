name: Build and Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: '0.0.1'
        required: true
        default: '0.0.1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Download rclone icon
        run: wget -O icon.png "https://raw.githubusercontent.com/ich777/mos-templates/master/images/rclone.png"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vue plugin
        working-directory: page
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          npm install
          npm run build

      - name: Create package structure
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="rclone-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_all"

          # Create directory structure
          mkdir -p ${PKG_DIR}/usr/bin/plugins
          mkdir -p ${PKG_DIR}/usr/bin
          mkdir -p ${PKG_DIR}/var/www/mos-plugins/rclone
          mkdir -p ${PKG_DIR}/DEBIAN

          # Copy backend script
          cp rclone ${PKG_DIR}/usr/bin/plugins/rclone
          chmod +x ${PKG_DIR}/usr/bin/plugins/rclone

          # Copy wrapper script
          cp rclone-wrapper ${PKG_DIR}/usr/bin/rclone
          chmod +x ${PKG_DIR}/usr/bin/rclone

          # Copy Vue plugin
          cp -R page/dist/rclone/* ${PKG_DIR}/var/www/mos-plugins/rclone/

          cp icon.png ${PKG_DIR}/var/www/mos-plugins/nvidia-driver/

          # Create DEBIAN control file
          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: rclone-plugin
          Version: ${VERSION}-1+mos-plugin
          Architecture: all
          Maintainer: admin@minenet.at
          Description: rclone Plugin for MOS
          EOF

          # Create postinst script
          cat > ${PKG_DIR}/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          chmod +x /usr/bin/plugins/rclone
          chmod +x /usr/bin/rclone
          exit 0
          EOF
          chmod +x ${PKG_DIR}/DEBIAN/postinst

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="rclone-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_all"
          DEB_FILE="${PKG_NAME}_all.deb"

          dpkg-deb --build ${PKG_DIR}

          # Generate MD5
          md5sum ${DEB_FILE} | awk '{print $1}' > ${DEB_FILE}.md5

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: rclone ${{ steps.version.outputs.VERSION }}
          body: |
            ## rclone Plugin ${{ steps.version.outputs.VERSION }}

          files: |
            rclone-${{ steps.version.outputs.VERSION }}-1+mos-plugin_all.deb
            rclone-${{ steps.version.outputs.VERSION }}-1+mos-plugin_all.deb.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
